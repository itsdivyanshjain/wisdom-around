name = "wisdom-around"
compatibility_date = "2025-07-31"

[[routes]]
pattern = "wisdomaround.com"
custom_domain = true

[[routes]]
pattern = "www.wisdomaround.com"
custom_domain = true

[build]
command = "chmod a+x build.sh && ./build.sh"

[assets]
directory = "./public"
not_found_handling = "404-page"